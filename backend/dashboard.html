<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broberg Consult LTD - API Viewer</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #3A619C 0%, #2c3e50 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3A619C 100%);
            color: white;
            text-align: center;
            padding: 30px 20px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }
        
        .stat-card {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            min-width: 150px;
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #3A619C;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .projects-grid {
            padding: 30px;
        }
        
        .projects-title {
            font-size: 2em;
            margin-bottom: 30px;
            color: #3A619C;
            text-align: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #3A619C;
        }
        
        .project-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #3A619C;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        .project-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .project-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .project-client {
            color: #7f8c8d;
            font-size: 1.1em;
        }
        
        .project-status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-transform: capitalize;
        }
        
        .status-planning { background: #fff3cd; color: #856404; }
        .status-in_progress { background: #cce7ff; color: #004085; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-on_hold { background: #f8d7da; color: #721c24; }
        .status-cancelled { background: #e2e3e5; color: #383d41; }
        
        .project-description {
            color: #666;
            margin: 15px 0;
            line-height: 1.6;
        }
        
        .project-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .detail-item {
            display: flex;
            flex-direction: column;
        }
        
        .detail-label {
            font-size: 0.8em;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .detail-value {
            font-weight: bold;
            color: #2c3e50;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #666;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .refresh-btn {
            background: #3A619C;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: background 0.3s ease;
            margin: 20px auto;
            display: block;
        }
        
        .refresh-btn:hover {
            background: #2980b9;
        }
        
        /* Icon styling */
        .fas {
            margin-right: 8px;
        }
        
        .stat-label .fas {
            margin-right: 5px;
            color: #3A619C;
        }
        
        .detail-label .fas {
            margin-right: 5px;
            color: #7f8c8d;
        }
        
        .header .fas {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-building"></i> Broberg Consult LTD</h1>
            <p><i class="fas fa-chart-line"></i> Project Management Dashboard</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="total-projects">-</div>
                <div class="stat-label"><i class="fas fa-folder"></i> Total Projects</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="active-projects">-</div>
                <div class="stat-label"><i class="fas fa-play"></i> Active Projects</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-budget">-</div>
                <div class="stat-label"><i class="fas fa-calendar"></i> Years Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="total-clients">-</div>
                <div class="stat-label"><i class="fas fa-users"></i> Clients</div>
            </div>
        </div>
        
        <div class="projects-grid">
            <h2 class="projects-title"><i class="fas fa-list-alt"></i> Current Projects</h2>
            <button class="refresh-btn" onclick="loadProjects()"><i class="fas fa-sync-alt"></i> Refresh Data</button>
            <div id="projects-container">
                <div class="loading">Loading projects...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        async function loadProjects() {
            const container = document.getElementById('projects-container');
            container.innerHTML = '<div class="loading">Loading projects...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/projects`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const projects = await response.json();
                displayProjects(projects);
                updateStats(projects);
                
            } catch (error) {
                console.error('Error loading projects:', error);
                container.innerHTML = `
                    <div class="error">
                        <h3>❌ Error Loading Projects</h3>
                        <p>${error.message}</p>
                        <p>Make sure your backend server is running on port 5000</p>
                    </div>
                `;
            }
        }
        
        function displayProjects(projects) {
            const container = document.getElementById('projects-container');
            
            if (projects.length === 0) {
                container.innerHTML = '<div class="loading">No projects found</div>';
                return;
            }
            
            const projectsHTML = projects.map(project => `
                <div class="project-card">
                    <div class="project-header">
                        <div>
                            <div class="project-name"><i class="fas fa-project-diagram"></i> ${project.name_of_project}</div>
                            <div class="project-client"><i class="fas fa-user"></i> ${project.client_name || 'No client specified'}</div>
                        </div>
                        <div class="project-status status-${project.status}">
                            ${project.status.replace('_', ' ')}
                        </div>
                    </div>
                    
                    <div class="project-description">
                        <strong>Features:</strong> ${project.project_features || 'No features specified'}<br>
                        <strong>Activities:</strong> ${project.activities || 'No activities specified'}
                    </div>
                    
                    <div class="project-details">
                        <div class="detail-item">
                            <span class="detail-label"><i class="fas fa-calendar-alt"></i> Date</span>
                            <span class="detail-value">${project.date || 'Not specified'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label"><i class="fas fa-map-marker-alt"></i> Location</span>
                            <span class="detail-value">${project.location || 'Not specified'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label"><i class="fas fa-briefcase"></i> Position</span>
                            <span class="detail-value">${project.position_held || 'Not specified'}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label"><i class="fas fa-dollar-sign"></i> Funding</span>
                            <span class="detail-value">${project.funding || 'Not specified'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = projectsHTML;
        }
        
        function updateStats(projects) {
            const totalProjects = projects.length;
            const activeProjects = projects.filter(p => ['planning', 'in_progress'].includes(p.status)).length;
            const uniqueClients = new Set(projects.map(p => p.client_name).filter(Boolean)).size;
            const totalYears = new Set(projects.map(p => {
                if (p.date) {
                    const year = p.date.match(/\d{4}/);
                    return year ? year[0] : null;
                }
                return null;
            }).filter(Boolean)).size;
            
            document.getElementById('total-projects').textContent = totalProjects;
            document.getElementById('active-projects').textContent = activeProjects;
            document.getElementById('total-budget').textContent = `${totalYears} Years`;
            document.getElementById('total-clients').textContent = uniqueClients;
        }
        
        // Load projects when page loads
        window.addEventListener('load', loadProjects);
    </script>
</body>
</html>
